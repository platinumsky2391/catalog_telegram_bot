name: Deploy Telegram Bot to Beget

on:
  push:
    branches:
      - main # Скрипт срабатывает каждый раз, когда вы делаете push в ветку main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies and Build Frontend
        run: |
          npm install
          npm run build # Сборка вашего Mini App (создает актуальную папку dist)

      - name: Prepare production files
        run: |
          mkdir deploy_build
          cp server.cjs deploy_build/
          cp server.cjs.map deploy_build/ 2>/dev/null || true
          cp package.json deploy_build/
          cp package-lock.json deploy_build/ 2>/dev/null || true
          cp -r dist deploy_build/
          cp app.js deploy_build/ 2>/dev/null || true
          
          # Создаем public_html и .htaccess прямо в папке для деплоя
          mkdir -p deploy_build/public_html
          cat << 'EOF' > deploy_build/public_html/.htaccess
          PassengerEnabled On
          PassengerAppRoot /home/p/platines/bot-solien
          PassengerAppType node
          PassengerStartupFile server.cjs
          PassengerNodejs /home/p/platines/bot-solien/bin/node
          PassengerAppEnv production
          EOF
          
          # Создаем tmp/restart.txt для перезапуска Passenger
          mkdir -p deploy_build/tmp
          date > deploy_build/tmp/restart.txt

      - name: Sync files to Beget via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./deploy_build/
          server-dir: / # Так как FTP-пользователь уже настроен на папку bot-solien, копируем прямо в корень FTP
          exclude: |
            **/.env
            **/node_modules/**
            **/bin/**